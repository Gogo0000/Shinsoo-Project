name: APK_Uretimi
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Araclar
        run: |
          pip install --user --upgrade buildozer
          pip install --user --upgrade Cython==0.29.33

      - name: APK Bas
        run: |
          buildozer android debug
        env:
          BUILDOZER_ALLOW_ORG_NAME_AS_PACKAGE_NAME: 1
          
      - name: APK Yukle (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: Shinsoo-Final-APK
          path: bin/*.apk
          
