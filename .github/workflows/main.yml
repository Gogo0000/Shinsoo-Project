name: APK_Uretimi
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Araclar
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libffi-dev \
            python3-dev \
            libssl-dev \
            zip unzip \
            git \
            cmake \
            libltdl-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            autoconf \
            libtool \
            pkg-config
          pip install --upgrade pip
          pip install buildozer Cython==0.29.37

      - name: Buildozer Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: APK Bas
        run: |
          buildozer android debug 2>&1 | tee build.log
        env:
          BUILDOZER_ALLOW_ORG_NAME_AS_PACKAGE_NAME: 1

      - name: APK Yukle
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: apk-ve-log
          path: |
            bin/*.apk
            build.log
