name: APK_Uretimi
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Araclar
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libffi-dev \
            python3-dev \
            libssl-dev \
            zip unzip \
            git \
            cmake \
            autoconf \
            libtool \
            pkg-config \
            openjdk-17-jdk
          pip install --upgrade pip
          pip install buildozer Cython==0.29.37

      - name: Buildozer Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: APK Bas
        run: |
          buildozer android debug 2>&1 | tee build.log || true

      - name: APK Kopyala
        run: |
          mkdir -p apk_output
          find . -name "*.apk" -exec cp {} apk_output/ \;
          ls -la apk_output/

      - name: APK ve Log Yukle
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: apk-ve-log
          path: |
            build.log
            apk_output/
