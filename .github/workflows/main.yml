name: APK_Uretimi
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depo Kontrol
        uses: actions/checkout@v4

      - name: Sunucuda Yer Ac (Kritik Adim)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bagimliliklari Yukle
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev python3-dev libssl-dev zip unzip
          pip install --user --upgrade buildozer

      - name: APK Derle
        run: |
          yes | buildozer android debug
        env:
          BUILDOZER_ALLOW_ORG_NAME_AS_PACKAGE_NAME: 1
          BUILDOZER_WARN_ON_ROOT: 1

      - name: APK Yukle (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: Shinsoo-Final-APK
          path: bin/*.apk
          
